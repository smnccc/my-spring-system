# =====================================================
# SERVER CONFIGURATION
# =====================================================
# Gagamit ng PORT mula sa Railway settings, default sa 6060
server.port=${PORT:6060}

# =====================================================
# POSTGRESQL DATABASE CONFIGURATION (DYNAMIC)
# =====================================================
# Kinukuha ang credentials mula sa Railway Variables (Huwag i-hardcode ang password dito)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =====================================================
# JPA / HIBERNATE CONFIGURATION
# =====================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Hibernate Batch Settings
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# =====================================================
# FILE UPLOAD SIZE LIMITS (FIX 413 ERROR)
# =====================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# =====================================================
# EMAIL CONFIGURATION (GMAIL SMTP)
# =====================================================
spring.mail.host=://gmail.com
spring.mail.port=587
spring.mail.username=furrealdcs@gmail.com   
spring.mail.password=gdcykpechyeqawmp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# =====================================================
# CORS CONFIGURATION
# =====================================================
# Pinapayagan ang lahat ng origins para sa frontend compatibility
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# =====================================================
# LOGGING
# =====================================================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web.multipart=DEBUG
